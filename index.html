<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampusOS - Live MySQL Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; background: white; border-radius: 24px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); overflow: hidden; min-height: 90vh; }
        .header { background: linear-gradient(135deg, #667eea, #764ba2); color: white; padding: 20px 30px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 24px; font-weight: 700; }
        .logo i { margin-right: 10px; }
        .db-status { background: rgba(0,0,0,0.3); padding: 8px 16px; border-radius: 20px; font-size: 12px; font-family: monospace; }
        .content { padding: 40px; }
        .btn { background: linear-gradient(135deg, #667eea, #764ba2); color: white; border: none; padding: 12px 24px; border-radius: 12px; cursor: pointer; font-weight: 600; transition: transform 0.2s; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(102,126,234,0.4); }
        .btn-danger { background: linear-gradient(135deg, #ef4444, #dc2626); }
        .btn-secondary { background: #64748b; }
        .card { background: #f8fafc; border-radius: 16px; padding: 25px; margin-bottom: 20px; border: 1px solid #e2e8f0; transition: all 0.3s; cursor: pointer; }
        .card:hover { transform: translateY(-5px); border-color: #667eea; box-shadow: 0 10px 20px rgba(102,126,234,0.15); }
        .card-static { cursor: default; }
        .card-static:hover { transform: none; box-shadow: none; border-color: #e2e8f0; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; margin-top: 20px; }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: linear-gradient(135deg, #667eea, #764ba2); color: white; padding: 25px; border-radius: 16px; text-align: center; }
        .stat-number { font-size: 36px; font-weight: 800; margin-bottom: 5px; }
        .form-group { margin-bottom: 20px; text-align: left; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #334155; }
        input, select { width: 100%; padding: 14px; border: 2px solid #e2e8f0; border-radius: 10px; font-family: inherit; font-size: 15px; }
        input:focus, select:focus { outline: none; border-color: #667eea; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #e2e8f0; vertical-align: middle;}
        th { background: #f8fafc; font-weight: 600; color: #475569; text-transform: uppercase; font-size: 13px; }
        .tabs { display: flex; gap: 15px; margin-bottom: 30px; border-bottom: 2px solid #e2e8f0; padding-bottom: 15px; }
        .tab { padding: 10px 25px; background: none; border: none; cursor: pointer; font-weight: 600; color: #64748b; font-size: 16px; border-radius: 8px; }
        .tab.active { background: #667eea; color: white; }
        .toast { position: fixed; bottom: 30px; right: 30px; background: #1e293b; color: white; padding: 15px 25px; border-radius: 12px; display: none; z-index: 2000; font-weight: 500; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(4px); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; border-radius: 24px; padding: 40px; max-width: 450px; width: 90%; text-align: center; }
        .event-badge { background: #e2e8f0; color: #334155; padding: 4px 10px; border-radius: 6px; font-size: 13px; font-weight: 500; display: inline-block; margin: 2px; }
        .login-error-box { background: #fee2e2; border: 1px solid #ef4444; padding: 15px; border-radius: 8px; margin-top: 15px; text-align: center; animation: fadeIn 0.3s ease; }
        .chart-container { background: white; border: 1px solid #e2e8f0; border-radius: 16px; padding: 20px; margin-bottom: 25px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="logo"><i class="fas fa-graduation-cap"></i> CampusOS</div>
        <div class="db-status" id="dbStatus">
            <i class="fas fa-plug"></i> Connecting to Backend...
        </div>
    </div>
    <div class="content" id="content"></div>
</div>

<div id="toast" class="toast"></div>
<div id="modal" class="modal">
    <div class="modal-content">
        <h2 id="modalTitle" style="margin-bottom: 20px; color: #1e293b;">Event Registration</h2>
        <div id="modalBody"></div>
    </div>
</div>

<script>
    const API_BASE = 'http://127.0.0.1:5000/api';
    let currentUser = null;
    let pendingEventId = null;
    let currentActiveOtp = null; 
    let chart1 = null; 
    let chart2 = null;
    
    // Global variables to hold events for fast filtering
    let globalAdminEvents = [];
    let globalStudentEvents = [];

    // --- UTILS ---
    function showToast(msg, isError = false) {
        const toast = document.getElementById('toast');
        toast.innerHTML = isError ? `<i class="fas fa-exclamation-circle"></i> ${msg}` : `<i class="fas fa-check-circle"></i> ${msg}`;
        toast.style.backgroundColor = isError ? '#ef4444' : '#10b981';
        toast.style.display = 'block';
        setTimeout(() => toast.style.display = 'none', 4000);
    }

    async function apiCall(endpoint, method = 'GET', data = null) {
        try {
            const options = { method, headers: { 'Content-Type': 'application/json' } };
            if (data) options.body = JSON.stringify(data);
            const response = await fetch(`${API_BASE}${endpoint}`, options);
            return await response.json();
        } catch (error) {
            console.error('API Error:', error);
            showToast('Cannot connect to Python server!', true);
            return { success: false };
        }
    }

    // --- SCREENS ---
    async function showEntryScreen() {
        const res = await apiCall('/stats');
        let statsHtml = '';
        if (res.success) {
            document.getElementById('dbStatus').innerHTML = '<i class="fas fa-database"></i> MySQL Connected';
            document.getElementById('dbStatus').style.background = 'rgba(16, 185, 129, 0.5)';
            statsHtml = `
                <div class="stats">
                    <div class="stat-card"><div class="stat-number">${res.stats.students}</div><div>Total Students</div></div>
                    <div class="stat-card"><div class="stat-number">${res.stats.events}</div><div>Total Events</div></div>
                    <div class="stat-card"><div class="stat-number">${res.stats.clubs}</div><div>Active Clubs</div></div>
                    <div class="stat-card"><div class="stat-number">${res.stats.registrations}</div><div>Registrations</div></div>
                </div>`;
        } else {
            document.getElementById('dbStatus').innerHTML = '<i class="fas fa-exclamation-triangle"></i> Backend Offline';
            document.getElementById('dbStatus').style.background = 'rgba(239, 68, 68, 0.8)';
        }

        document.getElementById('content').innerHTML = `
            <div style="text-align: center;">
                <h1 style="font-size: 42px; color: #1e293b; margin-bottom: 15px;">Welcome to CampusOS</h1>
                <p style="color: #64748b; font-size: 18px; margin-bottom: 40px;">Live Full-Stack College Management System.</p>
                ${statsHtml}
                <div class="grid" style="max-width: 1000px; margin: 0 auto;">
                    <div class="card" onclick="showLoginForm('student')">
                        <i class="fas fa-user-graduate" style="font-size: 48px; color: #667eea; margin-bottom: 15px;"></i>
                        <h2>Student Login</h2>
                        <small style="color: #10b981; font-weight: 600;">Access events & register</small>
                    </div>
                    <div class="card" onclick="showLoginForm('admin')">
                        <i class="fas fa-user-tie" style="font-size: 48px; color: #764ba2; margin-bottom: 15px;"></i>
                        <h2>Admin Login</h2>
                        <small style="color: #10b981; font-weight: 600;">Manage your club events</small>
                    </div>
                    <div class="card" onclick="showStudentRegistration()">
                        <i class="fas fa-user-plus" style="font-size: 48px; color: #f59e0b; margin-bottom: 15px;"></i>
                        <h2>New Student?</h2>
                        <small style="color: #10b981; font-weight: 600;">Saves to MySQL DB</small>
                    </div>
                </div>
            </div>`;
    }

    function showLoginForm(type) {
        const isAdmin = type === 'admin';
        document.getElementById('content').innerHTML = `
            <div style="max-width: 450px; margin: 0 auto; text-align: center;">
                <h2 style="margin-bottom: 25px;">${isAdmin ? 'Admin' : 'Student'} Login</h2>
                <div class="card card-static">
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="loginEmail" placeholder="Enter your email">
                    </div>
                    ${isAdmin ? `
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="loginPassword" value="admin123">
                    </div>` : ''}
                    <button class="btn" onclick="handleLogin('${type}')" style="width: 100%; padding: 15px; margin-bottom: 15px;">Login</button>
                    <button class="btn btn-secondary" onclick="showEntryScreen()" style="width: 100%; padding: 15px;">Back</button>
                    <div id="loginErrorArea"></div>
                </div>
            </div>`;
    }

    async function handleLogin(type) {
        const attemptedEmail = document.getElementById('loginEmail').value;
        const errorArea = document.getElementById('loginErrorArea');
        errorArea.innerHTML = ''; 
        
        const payload = { 
            type: type, 
            email: attemptedEmail,
            password: type === 'admin' ? document.getElementById('loginPassword').value : ''
        };
        const res = await apiCall('/login', 'POST', payload);
        
        if (res.success) {
            currentUser = { ...res.user, userType: type };
            showToast(`Welcome, ${currentUser.name}!`);
            type === 'student' ? showStudentDashboard() : showAdminDashboard();
        } else {
            if (type === 'student') {
                errorArea.innerHTML = `
                    <div class="login-error-box">
                        <p style="color: #dc2626; font-weight: 600; margin-bottom: 10px;">
                            <i class="fas fa-exclamation-circle"></i> This account doesn't exist.
                        </p>
                        <button class="btn" style="background: linear-gradient(135deg, #f59e0b, #d97706); padding: 8px 16px; font-size: 14px; width: 100%;" onclick="goToRegistrationWithEmail('${attemptedEmail}')">
                            Create a New Account
                        </button>
                    </div>`;
            } else showToast('Invalid admin credentials.', true);
        }
    }
    
    function goToRegistrationWithEmail(email) {
        showStudentRegistration();
        setTimeout(() => { document.getElementById('regEmail').value = email; }, 50);
    }

    function logout() { currentUser = null; showEntryScreen(); }

    // --- STUDENT ACTIONS ---
    function showStudentRegistration() {
        document.getElementById('content').innerHTML = `
            <div style="max-width: 600px; margin: 0 auto;">
                <h2 style="text-align: center; margin-bottom: 25px;">New Student Registration</h2>
                <div class="card card-static">
                    <div class="grid" style="grid-template-columns: 1fr 1fr; margin-top: 0;">
                        <div class="form-group"><label>Full Name *</label><input type="text" id="regName"></div>
                        <div class="form-group"><label>Email *</label><input type="email" id="regEmail"></div>
                        <div class="form-group"><label>Phone</label><input type="text" id="regPhone"></div>
                        <div class="form-group"><label>College</label><input type="text" id="regCollege"></div>
                        <div class="form-group">
                            <label>Department</label>
                            <select id="regDept"><option>Computer Science</option><option>IT</option><option>Mechanical</option><option>Civil</option></select>
                        </div>
                        <div class="form-group"><label>Year</label><select id="regYear"><option>1</option><option>2</option><option>3</option><option>4</option></select></div>
                    </div>
                    <div class="form-group"><label>Create Password *</label><input type="password" id="regPassword"></div>
                    <button class="btn" onclick="registerStudent()" style="width: 100%; margin-bottom: 10px; padding: 15px;">Register Now</button>
                    <button class="btn btn-secondary" onclick="showEntryScreen()" style="width: 100%; padding: 15px;">Cancel</button>
                </div>
            </div>`;
    }

    async function registerStudent() {
        const payload = {
            name: document.getElementById('regName').value, email: document.getElementById('regEmail').value,
            phone: document.getElementById('regPhone').value, department: document.getElementById('regDept').value,
            year: document.getElementById('regYear').value, college: document.getElementById('regCollege').value,
            password: document.getElementById('regPassword').value
        };
        if (!payload.name || !payload.email || !payload.password) return showToast('Fill required fields!', true);
        
        const res = await apiCall('/register_student', 'POST', payload);
        if (res.success) { showToast('Account Created! Log in now.'); showEntryScreen(); } 
        else showToast(res.error, true);
    }

    async function showStudentDashboard() {
        const [eventsRes, regsRes] = await Promise.all([
            apiCall('/events'), apiCall(`/my_registrations/${currentUser.id}`)
        ]);

        let eventsSectionHtml = '';
        if (eventsRes.success && eventsRes.events.length > 0) {
            globalStudentEvents = eventsRes.events; // Store locally for fast filtering
            
            // Render the Dropdown Filter Header
            eventsSectionHtml = `
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px;">
                    <h3 style="margin: 0; color: #1e293b;"><i class="fas fa-calendar-check"></i> Available Events</h3>
                    <select id="studentEventFilter" onchange="filterStudentEventsGrid(this.value)" style="width: auto; padding: 6px 12px; font-weight: 600; color: #475569; background: white; border: 2px solid #cbd5e1; border-radius: 8px;">
                        <option value="all">All Events</option>
                        <option value="upcoming">Upcoming Events</option>
                        <option value="completed">Completed Events</option>
                    </select>
                </div>
                <div id="studentEventsWrapper" class="grid" style="margin-bottom: 40px;"></div>
            `;
        } else {
            eventsSectionHtml = '<h3 style="border-bottom: 2px solid #e2e8f0; padding-bottom: 10px;">Available Events</h3><p>No events available.</p>';
        }

        let regsTable = '<p>No registrations yet.</p>';
        if (regsRes.success && regsRes.registrations.length > 0) {
            regsTable = `<table><tr><th>Event & Status</th><th>Date</th><th>Reg Status</th></tr>
                ${regsRes.registrations.map(r => {
                    // Check date to add badge to the student's registration table
                    const eDate = new Date(r.event_date);
                    eDate.setHours(0, 0, 0, 0);
                    const today = new Date();
                    today.setHours(0, 0, 0, 0);
                    const isUpcoming = eDate >= today;
                    const badge = isUpcoming 
                        ? '<span style="background:#dcfce7; color:#166534; padding:2px 8px; border-radius:12px; font-size:11px; font-weight:600;">Upcoming</span>'
                        : '<span style="background:#f1f5f9; color:#475569; padding:2px 8px; border-radius:12px; font-size:11px; font-weight:600;">Completed</span>';

                    return `<tr>
                        <td><b>${r.event_name}</b><br>${badge}</td>
                        <td>${eDate.toLocaleDateString()}</td>
                        <td style="color:#10b981;font-weight:600;">${r.status}</td>
                    </tr>`;
                }).join('')}
            </table>`;
        }

        document.getElementById('content').innerHTML = `
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
                <div><h2 style="font-size: 28px;">Student Dashboard</h2><p>Welcome, ${currentUser.name}</p></div>
                <button class="btn btn-secondary" onclick="logout()">Logout</button>
            </div>
            ${eventsSectionHtml}
            <h3 style="border-bottom: 2px solid #e2e8f0; padding-bottom: 10px;">My Registrations</h3>
            ${regsTable}
        `;

        if (eventsRes.success && eventsRes.events.length > 0) {
            filterStudentEventsGrid('all'); // Generate the initial grid
        }
    }

    // NEW: Client-side date filter logic for the Student Events Grid
    function filterStudentEventsGrid(filterType) {
        const wrapper = document.getElementById('studentEventsWrapper');
        if(!wrapper) return;

        const today = new Date();
        today.setHours(0, 0, 0, 0);

        const filteredEvents = globalStudentEvents.filter(e => {
            const eventDate = new Date(e.date);
            eventDate.setHours(0, 0, 0, 0);

            if (filterType === 'upcoming') return eventDate >= today;
            if (filterType === 'completed') return eventDate < today;
            return true; 
        });

        if (filteredEvents.length === 0) {
            wrapper.innerHTML = '<p style="color: #64748b; font-style: italic; grid-column: 1 / -1;">No events match this filter.</p>';
            return;
        }

        // Draw the filtered grid of cards with Status Badges
        wrapper.innerHTML = filteredEvents.map(evt => {
            const eDate = new Date(evt.date);
            eDate.setHours(0, 0, 0, 0);
            const isUpcoming = eDate >= today;
            const badge = isUpcoming 
                ? '<span style="background:#dcfce7; color:#166534; padding:2px 8px; border-radius:12px; font-size:11px; font-weight:600; margin-bottom: 8px; display: inline-block;">Upcoming</span>'
                : '<span style="background:#f1f5f9; color:#475569; padding:2px 8px; border-radius:12px; font-size:11px; font-weight:600; margin-bottom: 8px; display: inline-block;">Completed</span>';

            return `
                <div class="card card-static">
                    ${badge}
                    <h3 style="margin-top: 5px;">${evt.name}</h3>
                    <p style="color: #64748b; font-size: 14px; margin: 8px 0;"><i class="far fa-calendar-alt"></i> ${eDate.toLocaleDateString()}</p>
                    <p style="color: #64748b; font-size: 14px; margin-bottom: 15px;"><i class="fas fa-users"></i> ${evt.club_name}</p>
                    <button class="btn" onclick="showRegistrationModal('${evt.id}', '${evt.name}')" style="width: 100%;">Register (₹${evt.fee})</button>
                </div>`;
        }).join('');
    }

    // --- OTP & PAYMENT SUCCESS FEATURE ---
    function showRegistrationModal(eventId, eventName) {
        pendingEventId = eventId;
        currentActiveOtp = String(Math.floor(100000 + Math.random() * 900000));
        
        document.getElementById('modalBody').innerHTML = `
            <i class="fas fa-ticket-alt" style="font-size: 48px; color: #667eea; margin-bottom: 20px;"></i>
            <h3>${eventName}</h3>
            <p style="margin: 15px 0;">Your Verification OTP: <strong style="color: #10b981; letter-spacing: 2px; font-size: 20px; background: #e2e8f0; padding: 4px 10px; border-radius: 6px;">${currentActiveOtp}</strong></p>
            <input type="text" id="otpInput" placeholder="Enter OTP" maxlength="6" style="text-align: center; font-size: 20px; letter-spacing: 5px; margin-bottom: 20px;">
            <button class="btn" onclick="verifyOTPAndRegister()" style="width: 100%; margin-bottom: 10px;">Verify & Register</button>
            <button class="btn btn-secondary" onclick="closeModal()" style="width: 100%;">Cancel</button>
        `;
        document.getElementById('modal').style.display = 'flex';
    }

    async function verifyOTPAndRegister() {
        const userInput = document.getElementById('otpInput').value;
        
        if (userInput !== currentActiveOtp) {
            return showToast('Invalid OTP! Please check the number above.', true);
        }

        showToast('💳 Payment Successful! Processing registration...');

        setTimeout(async () => {
            const res = await apiCall('/register_event', 'POST', { student_id: currentUser.id, event_id: pendingEventId });
            
            if (res.success) {
                closeModal();
                showToast('🎉 Registration Completed!');
                showStudentDashboard();
            } else {
                showToast(res.error, true);
            }
        }, 1500); 
    }
    
    function closeModal() { 
        document.getElementById('modal').style.display = 'none'; 
        pendingEventId = null; 
        currentActiveOtp = null;
    }

    // --- ADMIN ACTIONS ---
    async function showAdminDashboard() {
        document.getElementById('content').innerHTML = `
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
                <div><h2 style="font-size: 28px;">Admin Dashboard</h2><p>${currentUser.name} | Managing: ${currentUser.club_name}</p></div>
                <button class="btn btn-secondary" onclick="logout()">Logout</button>
            </div>
            <div class="tabs">
                <button class="tab active" onclick="switchAdminTab('events', this)">Events Directory</button>
                <button class="tab" onclick="switchAdminTab('add', this)">Add Event</button>
                <button class="tab" onclick="switchAdminTab('students', this)">System Students</button>
                <button class="tab" onclick="switchAdminTab('analytics', this)"><i class="fas fa-chart-bar"></i> Analytics</button>
            </div>
            <div id="adminTabContent"></div>
        `;
        switchAdminTab('events', document.querySelector('.tab.active'));
    }

    async function switchAdminTab(tab, btnElement) {
        if(btnElement) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            btnElement.classList.add('active');
        }
        const content = document.getElementById('adminTabContent');
        content.innerHTML = '<p>Loading...</p>';

        if (tab === 'events') {
            const endpoint = currentUser.role === 'superadmin' ? '/events' : `/events?club_id=${currentUser.club_id}`;
            const res = await apiCall(endpoint);
            
            if (res.success && res.events.length > 0) {
                globalAdminEvents = res.events; 
                
                content.innerHTML = `
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; background: #f8fafc; padding: 15px; border-radius: 12px; border: 1px solid #e2e8f0;">
                        <h3 style="color:#334155; margin:0;"><i class="fas fa-calendar-alt"></i> Manage Events</h3>
                        <select id="eventDateFilter" onchange="filterAdminEventsTable(this.value)" style="width: auto; padding: 8px 15px; font-weight: 600; color: #475569; background: white; border: 2px solid #cbd5e1; border-radius: 8px;">
                            <option value="all">All Events</option>
                            <option value="upcoming">Upcoming Events</option>
                            <option value="completed">Completed Events</option>
                        </select>
                    </div>
                    <div id="eventsTableWrapper"></div>
                `;
                filterAdminEventsTable('all'); 
                
            } else content.innerHTML = '<p>No events found.</p>';
        } 
        else if (tab === 'add') {
            if(currentUser.role === 'superadmin') return content.innerHTML = '<p style="color:red;">Super Admins cannot create events.</p>';
            content.innerHTML = `
                <div class="card card-static" style="max-width: 600px;">
                    <div class="form-group"><label>Event Name</label><input type="text" id="newEventName"></div>
                    <div class="grid" style="grid-template-columns: 1fr 1fr; margin-top:0;">
                        <div class="form-group"><label>Date</label><input type="date" id="newEventDate"></div>
                        <div class="form-group"><label>Venue</label><input type="text" id="newEventVenue"></div>
                        <div class="form-group"><label>Fee (₹)</label><input type="number" id="newEventFee" value="0"></div>
                    </div>
                    <button class="btn" onclick="addEvent()" style="width: 100%;">Publish to Database</button>
                </div>`;
        } 
        else if (tab === 'students') {
            const res = await apiCall('/students');
            if (res.success && res.students.length > 0) {
                content.innerHTML = `<table>
                    <tr><th>Name/ID</th><th>Email</th><th>College</th><th>Registered Events</th><th>Actions</th></tr>
                    ${res.students.map(s => {
                        let eventsHtml = '<span style="color:#94a3b8; font-style:italic;">None</span>';
                        if (s.registered_events) eventsHtml = s.registered_events.split(',').map(e => `<span class="event-badge">${e.trim()}</span>`).join('');
                        return `<tr>
                            <td><b>${s.name}</b><br><small style="color:#64748b;">${s.id}</small></td>
                            <td>${s.email}</td>
                            <td>${s.college}</td>
                            <td>${eventsHtml}</td>
                            <td><button class="btn btn-danger" style="padding: 8px 12px; font-size: 13px;" onclick="deleteStudent('${s.id}')">Delete</button></td>
                        </tr>`;
                    }).join('')}</table>`;
            } else content.innerHTML = '<p>No students found.</p>';
        }
        else if (tab === 'analytics') {
            const endpoint = `/analytics?role=${currentUser.role}&club_id=${currentUser.club_id}`;
            const res = await apiCall(endpoint);
            
            content.innerHTML = `
                <div class="grid" style="grid-template-columns: 1fr 1fr; margin-top: 0;">
                    <div class="chart-container">
                        <h3 style="text-align:center; color:#334155; margin-bottom:15px;">Registrations by Department</h3>
                        <canvas id="deptChart"></canvas>
                    </div>
                    <div class="chart-container">
                        <h3 style="text-align:center; color:#334155; margin-bottom:15px;">Registrations by Event</h3>
                        <canvas id="eventChart"></canvas>
                    </div>
                </div>`;

            if (res.success) {
                if(chart1) chart1.destroy();
                if(chart2) chart2.destroy();

                const deptLabels = res.data.departments.map(d => d.label || 'Unknown');
                const deptData = res.data.departments.map(d => d.count);
                
                const eventLabels = res.data.events.map(e => e.label || 'Unknown');
                const eventData = res.data.events.map(e => e.count);

                const ctxDept = document.getElementById('deptChart').getContext('2d');
                chart1 = new Chart(ctxDept, {
                    type: 'bar',
                    data: {
                        labels: deptLabels,
                        datasets: [{ label: 'Students', data: deptData, backgroundColor: 'rgba(102, 126, 234, 0.7)', borderColor: '#667eea', borderWidth: 1 }]
                    },
                    options: { responsive: true, scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } } }
                });

                const ctxEvent = document.getElementById('eventChart').getContext('2d');
                chart2 = new Chart(ctxEvent, {
                    type: 'bar',
                    data: {
                        labels: eventLabels,
                        datasets: [{ label: 'Registrations', data: eventData, backgroundColor: 'rgba(118, 75, 162, 0.7)', borderColor: '#764ba2', borderWidth: 1 }]
                    },
                    options: { responsive: true, scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } } }
                });
            } else {
                content.innerHTML = `<p style="color:red;">Error loading charts: ${res.error}</p>`;
            }
        }
    }

    function filterAdminEventsTable(filterType) {
        const wrapper = document.getElementById('eventsTableWrapper');
        if(!wrapper) return;

        const today = new Date();
        today.setHours(0, 0, 0, 0);

        const filteredEvents = globalAdminEvents.filter(e => {
            const eventDate = new Date(e.date);
            eventDate.setHours(0, 0, 0, 0);

            if (filterType === 'upcoming') return eventDate >= today;
            if (filterType === 'completed') return eventDate < today;
            return true; 
        });

        if (filteredEvents.length === 0) {
            wrapper.innerHTML = '<p style="color: #64748b; font-style: italic; margin-top: 20px;">No events match this filter.</p>';
            return;
        }

        wrapper.innerHTML = `<table><tr><th>ID</th><th>Name & Status</th><th>Date</th><th>Fee</th><th>Actions</th></tr>
            ${filteredEvents.map(e => {
                const eDate = new Date(e.date);
                eDate.setHours(0, 0, 0, 0);
                const isUpcoming = eDate >= today;
                const badge = isUpcoming 
                    ? '<span style="background:#dcfce7; color:#166534; padding:2px 8px; border-radius:12px; font-size:11px; font-weight:600;">Upcoming</span>'
                    : '<span style="background:#f1f5f9; color:#475569; padding:2px 8px; border-radius:12px; font-size:11px; font-weight:600;">Completed</span>';

                return `<tr>
                    <td><small style="color:#64748b;">${e.id}</small></td>
                    <td><b>${e.name}</b><br>${badge}</td>
                    <td>${eDate.toLocaleDateString()}</td>
                    <td>₹${e.fee}</td>
                    <td><button class="btn btn-danger" style="padding: 6px 12px; font-size: 13px;" onclick="deleteEvent('${e.id}')">Delete</button></td>
                </tr>`;
            }).join('')}</table>`;
    }

    async function addEvent() {
        const payload = {
            name: document.getElementById('newEventName').value, date: document.getElementById('newEventDate').value,
            venue: document.getElementById('newEventVenue').value, fee: document.getElementById('newEventFee').value,
            club_id: currentUser.club_id, club_name: currentUser.club_name
        };
        const res = await apiCall('/add_event', 'POST', payload);
        if (res.success) { showToast('Event Saved to DB!'); showAdminDashboard(); }
    }

    async function deleteEvent(id) {
        if(confirm('Delete event and all its registrations from database?')) {
            const res = await apiCall(`/delete_event/${id}`, 'DELETE');
            if (res.success) { showToast('Deleted from DB'); switchAdminTab('events'); }
        }
    }

    async function deleteStudent(id) {
        if(confirm('Permanently delete student from database?')) {
            const res = await apiCall(`/delete_student/${id}`, 'DELETE');
            if (res.success) { showToast('Deleted from DB'); switchAdminTab('students'); }
        }
    }

    window.onload = showEntryScreen;
</script>
</body>
</html>
